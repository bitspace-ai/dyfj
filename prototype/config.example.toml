# DYFJ workbench engine config — hand-edited, read-mostly.
#
# Copy to ~/.dyfj/config.toml and edit. Every key is optional; omit one to use
# its default. The app never writes this file (machine state lives elsewhere),
# so your comments and formatting are always safe.
#
# Precedence: these values < environment variables < per-request overrides.

[companion]
# Model the engine uses when a turn doesn't specify one.
# Omit (or leave blank) to use the registry's local default.
# A frontier slug suits the companion — text chat is cheap.
# default_model = "claude-opus-4-8"

[permissions]
# Command-policy posture:
#   "strict"   — every mutating tool asks for per-call approval (safe default)
#   "operator" — auto-approves contained mutating tools (local, free, workspace-
#                write) on a loopback operator turn; paid/networked/exec still prompt
level = "strict"

[paid]
# Standing paid-inference posture on loopback turns. When a request omits the
# per-turn approvePaidInference flag, the engine falls back to this default.
# Explicit per-turn opt-in/out (--approve-paid) always wins.
# approve_paid_default = true

[budget]
# Startup budget ceilings (USD). When projected spend would cross a ceiling the
# runtime warns and requires explicit confirmation before proceeding; without
# an interactive approver it fails closed. Per-turn overrides still win.
# session_limit_usd = 1.0
# per_call_limit_usd = 0.10

# The full configuration surface is declared in src/config.ts (CONFIG_SCHEMA),
# split into engine vs client domains, with secret keys held as POINTERS (op:// /
# keychain / env-var name), never plaintext. Keys above have a config-FILE layer;
# the rest resolve against the same declared surface at the runtime boundary.

# DYFJ workbench engine config — hand-edited, read-mostly.
#
# Copy to ~/.dyfj/config.toml and edit. Every key is optional; omit one to use
# its default. The app never writes this file (machine state lives elsewhere),
# so your comments and formatting are always safe.
#
# Precedence: these values < environment variables < per-request overrides.

[companion]
# Model the engine uses when a turn doesn't specify one.
# Omit (or leave blank) to use the registry's local default.
# A frontier slug suits the companion — text chat is cheap.
# default_model = "claude-opus-4-8"

[permissions]
# Command-policy posture:
#   "strict"   — every mutating tool asks for per-call approval (safe default)
#   "operator" — auto-approves contained mutating tools (local, free, workspace-
#                write) on a loopback operator turn; paid/networked/exec still prompt
level = "strict"

[paid]
# Standing paid-inference posture on loopback turns. When a request omits the
# per-turn approvePaidInference flag, the engine falls back to this default.
# Explicit per-turn opt-in/out (--approve-paid) always wins.
# approve_paid_default = true

[budget]
# Startup budget ceilings (USD). When projected spend would cross a ceiling the
# runtime warns and requires explicit confirmation before proceeding; without
# an interactive approver it fails closed. Per-turn overrides still win.
# session_limit_usd = 1.0
# per_call_limit_usd = 0.10
# Daily envelope: total spend across ALL sessions in a local day (rolled up
# from the events table). Confirming a crossed ceiling raises that envelope
# for its scope — the session, or the whole day — instead of re-prompting.
# daily_limit_usd = 25.0

[anomaly]
# Runaway-anomaly hard-stop multiples, applied to ACTUAL recorded spend (never
# estimates) before every paid call. Unlike the soft ceilings above, an
# approval here admits only the next call — nothing is raised, further
# anomalous spend prompts again, and non-interactive callers fail closed.
# Multiples must be strictly positive and there is no disable knob. The
# multiples are config-only (no per-request field); the dollar thresholds
# they produce scale with the budget envelope in force, including an explicit
# loopback per-turn budget override — the gate always binds at
# multiple × the effective limit.
#   turn halt:  turn_multiple  × per_call_limit_usd of real spend in one turn
#   scope halt: scope_multiple × the session/daily envelope
# turn_multiple = 3.0
# scope_multiple = 2.0

[secrets]
# Declared secret POINTERS, resolved into the process environment at boot so
# `dyfj start` alone yields a fully capable runtime (hosted + local). A declared
# secret's VALUE never lands here via the pointer mechanism — only the pointer
# does — nor in logs or error messages. (The [secrets.env] map below is a
# separate PLAINTEXT surface for non-secret resolver env; keep credentials out.)
#
# TRUST BOUNDARY: `command` is a trusted EXECUTABLE, not inert data — the
# launcher grants that binary --allow-run and the engine runs it automatically
# at boot (in an ISOLATED env — see below). A shell/interpreter
# (["bash","-c",...]) runs arbitrary code. So protect THIS FILE like executable
# policy: restrictive permissions, no untrusted writers. `command` is
# vendor-neutral (`op read` is one choice; any command that prints the secret to
# stdout works); the pointer is appended as its final argument (so vault/item
# names may be visible to local process inspection — metadata, not the value).
# command = ["op", "read"]
#
# The command runs with stdin closed (no terminal prompt) and this timeout
# bounds the wait. Fail-closed on timeout is RESULT-LEVEL: the env var is never
# set (the provider gets no key) and the IMMEDIATE resolver process is SIGKILLed.
# The engine does NOT reap the resolver's process tree (Deno has no process-group
# primitive), so a shell-wrapper resolver can leave a descendant running past the
# timeout — it cannot inject into the runtime, but may keep a vault unlocked.
# PREFER A DIRECT-BINARY RESOLVER (`op read` has no descendant tree). Closing
# stdin also does NOT stop a GUI-integrated manager from raising a biometric
# prompt out-of-band. Milliseconds; default 10000.
# timeout_ms = 10000

# Pointers keyed by the declared secret env var. Only keys declared as
# secret-pointer in src/config.ts (CONFIG_SCHEMA) are accepted; anything else
# fails the boot loudly. env WINS — an already-set var is left alone and its
# pointer is not consulted, so `op run` / ambient projection still overrides.
# SESSION-FIRST (best-effort, not a guarantee): the FIRST pointer declared here
# is resolved alone to warm the resolver's auth session; only if it succeeds do
# the rest resolve concurrently. For a resolver that caches auth after the first
# unlock, that reduces the interactive unlocks toward one rather than one per
# pointer; a resolver that re-authenticates per invocation could still prompt
# more. Any probe failure (timeout / declined unlock / bad first ref) skips the
# rest fail-closed. Put a reliable pointer first. Prefer opaque vault/item names
# in pointers — they travel in the resolver's argv (visible to `ps`).
# [secrets.pointers]
# ANTHROPIC_API_KEY     = "op://<vault>/<item>/credential"
# OPENAI_API_KEY        = "op://<vault>/<item>/credential"
# GEMINI_API_KEY        = "op://<vault>/<item>/credential"
# DYFJ_MEMORY_MCP_TOKEN = "op://<vault>/<item>/credential"
# DOLT_PASSWORD         = "op://<vault>/<item>/credential"

# ISOLATED RESOLVER ENV. The resolver runs with a CLEARED environment — it sees
# only a minimal non-secret base (PATH, HOME, USER, XDG_RUNTIME_DIR), [secrets.env]
# below, and the names in inherit_env — NOT the runtime's other secrets (provider
# keys, DOLT_PASSWORD, the memory token). Trusting a command to resolve one
# pointer does not hand it every credential the runtime holds.

# [secrets.env] — NON-SECRET plaintext env set only on the spawned resolver
# command. For non-secret resolver knobs (an account name, a --flag, a toggle).
# Declared secret env vars are REJECTED here; keep other credentials out too —
# the engine can't know an arbitrary name is secret.
# [secrets.env]
# OP_ACCOUNT = "my.1password.com"

# [secrets].inherit_env — names of AMBIENT vars to FORWARD into the resolver's
# cleared environment. This is how a launch-scope resolver secret (e.g. a service-
# account TOKEN, exported into the runtime env from a keychain-backed source — a
# launchd plist stores it as plaintext, a last resort) reaches the resolver
# WITHOUT the resolver also inheriting the runtime's other secrets. Same denylist
# + declared-secret rules as [secrets.env]. Interactive daily driving needs none
# of this: app-biometric is fine.
# inherit_env = ["OP_SERVICE_ACCOUNT_TOKEN"]

# The full configuration surface is declared in src/config.ts (CONFIG_SCHEMA),
# split into engine vs client domains, with secret keys held as POINTERS (op:// /
# keychain / env-var name), never plaintext. Keys above have a config-FILE layer;
# the rest resolve against the same declared surface at the runtime boundary.
